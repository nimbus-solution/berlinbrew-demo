# Nimbus project configuration for BerlinBrew. Demonstrates the
# real-world settings a Salesforce project on Nimbus tends to need.
#
# Full reference: https://testnimbus.dev/docs/configuration

# ─── Managed packages ──────────────────────────────────────────────────────
#
# `Hoplog` is a fictional logging managed package this demo depends on.
# It's not a real package — it just exists in the codebase as references
# to `Hoplog.Logger.info(...)` and friends. Declaring the namespace here
# tells Nimbus to treat any `Hoplog.*` reference as opaque (auto-stub:
# returns null/empty/no-op). Matching is case-insensitive (Apex itself
# is case-insensitive), but lead by example: capitalize.
#
# In your own project, add the namespaces of packages you've installed
# (for example: Nebula, fflib, ApexRollup) and don't need test-time
# behavior from. For packages you DO need behavior from, drop an
# explicit stub under stubs/<Namespace>/ — see stubs/README.md.
nimbus.stubs.namespaces=Hoplog

# ─── Governor limits ───────────────────────────────────────────────────────
#
# warn: track usage, print a warning when limits are hit (default)
# strict: throw a real Apex LimitException, like Salesforce
# off: disable enforcement (fastest, least faithful)
#
# Local dev defaults to warn so iteration stays fast; CI tightens via
# the %ci. profile at the bottom.
nimbus.governor.mode=warn

# ─── Custom labels ─────────────────────────────────────────────────────────
#
# BerlinBrew references a few custom labels in code. Most are bundled
# in force-app/main/default/labels/ and load from project metadata —
# but values that differ per-org (e.g. an environment-specific URL)
# can be seeded here. Format:
#   nimbus.seed.label.<FullName>=<value>
nimbus.seed.label.BrewWelcomeSubject=Welcome to BerlinBrew

# ─── Custom metadata records (optional) ────────────────────────────────────
#
# If your project ships records in customMetadata/ they load
# automatically. Use this only for records that exist in the org but
# aren't tracked in source. Format:
#   nimbus.seed.record.<Object>.<Name>=Field1=value,Field2=value

# ─── CI profile (overrides above when NIMBUS_PROFILE=ci) ────────────────────
#
# Tighter governor enforcement catches "passed locally, would fail on
# org" issues before merge.
%ci.nimbus.governor.mode=strict
%ci.nimbus.test.parallel=4
